  <script type="text/babel">
    const { useState, useEffect } = React;

        <path d="M6.343 3.515a2 2 0 0 1 2.828 2.828l1.768-1.768a2 2 0 1 1 2.828 2.829l-6.364 6.364a2 2 0 1 1-2.828-2.829l1.767-1.767a2 2 0 1 1-2.828-2.828z"></path>
      </svg>
    );
    const Trash2 = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

    const Heart = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
    );
    const Eye = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
    );
    const FootprintsIcon = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5 10 7.89 8 10 8 12h0a3.5 3.5 0 0 0 3.5 3.5h0"></path>
        <path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 2.39 2 4.5 2 6.5h0a3.5 3.5 0 0 1-3.5 3.5h0"></path>
      </svg>
    );
    const ScaleIcon = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="5" r="3"></circle>
        <path d="M12 8v13"></path>
        <path d="M5 21h14"></path>
        <path d="M5 12l-2 5h4l-2-5z"></path>
        <path d="M19 12l-2 5h4l-2-5z"></path>
        <path d="M5 12h14"></path>
      </svg>
    );

    /* ── Muscle Groups ── */
    const MUSCLE_GROUPS = {
      'Chest': ['Bench Press', 'Incline Dumbbell Press', 'Chest Dips','Cable Flyes', ],
      'Back': ['Pull-ups', 'Lat Pulldown', 'Seated Cable Rows', 'Deadlift',],
      'Legs': ['Squats', 'Leg Press', 'Leg Curls', 'Bulgarian Split Squats', 'RDL', 'Calf Raises'],
      'Shoulders': ['Overhead Press', 'Lateral Raises', 'Face Pulls', 'Shrugs'],
      'Biceps': ['Barbell Curls', 'DB Curls', 'Cable Curls',],
      'Triceps': ['Skull Crushers', 'Overhead Extension', 'Pushdowns', 'Close Grip Bench'],
      'Core': ['Planks', 'Hanging Leg Raises', 'Cable Crunches', 'Russian Twists', 'Ab Wheel'],
      'Glutes': ['Hip Thrusts', 'Bulgarian Split Squats', 'Glute Kickbacks', 'Cable Pull-throughs', 'Sumo Deadlift']
    };

    /* ── Stopwatch ── */
    const Stopwatch = React.memo(function Stopwatch() {
      const { useRef, useState, useEffect } = React;
      const baseRef = useRef(0);
      const startRef = useRef(null);
      const runningRef = useRef(false);
      const rafRef = useRef(null);
      const [display, setDisplay] = useState('0:00.0');
      const [running, setRunning] = useState(false);

      useEffect(() => {
        try {
          const saved = JSON.parse(localStorage.getItem('swState2') || 'null');
          if (saved) {
            if (saved.running && saved.startedAt) {
              baseRef.current = saved.base + (Date.now() - saved.startedAt);
              startRef.current = Date.now();
              runningRef.current = true;
              setRunning(true);
            } else {
              baseRef.current = saved.base || 0;
            }
          }
        } catch (e) {}
      }, []);

      useEffect(() => {
        const tick = () => {
          if (!runningRef.current) return;
          const elapsed = (baseRef.current + (Date.now() - startRef.current)) / 1000;
          const h = Math.floor(elapsed / 3600);
          const m = Math.floor((elapsed % 3600) / 60);
          const s = Math.floor(elapsed % 60);
          const cs = Math.floor((elapsed % 1) * 10);
          setDisplay(
            h > 0
              ? h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') + '.' + cs
              : m + ':' + String(s).padStart(2, '0') + '.' + cs
          );
          rafRef.current = requestAnimationFrame(tick);
        };
        if (running) rafRef.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafRef.current);
      }, [running]);

      useEffect(() => {
        const save = () => {
          localStorage.setItem('swState2', JSON.stringify({
            base: baseRef.current,
            running: runningRef.current,
            startedAt: runningRef.current ? startRef.current : null
          }));
        };
        window.addEventListener('beforeunload', save);
        document.addEventListener('visibilitychange', save);
        return () => {
          window.removeEventListener('beforeunload', save);
          document.removeEventListener('visibilitychange', save);
        };
      }, []);

      const handleStart = () => {
        if (runningRef.current) return;
        startRef.current = Date.now();
        runningRef.current = true;
        setRunning(true);
      };
      const handlePause = () => {
        if (!runningRef.current) return;
        baseRef.current += Date.now() - startRef.current;
        startRef.current = null;
        runningRef.current = false;
        setRunning(false);
      };
      const handleReset = () => {
        cancelAnimationFrame(rafRef.current);
        baseRef.current = 0;
        startRef.current = null;
        runningRef.current = false;
        setRunning(false);
        setDisplay('0:00.0');
        localStorage.removeItem('swState2');
      };

      return (
        <div className="stopwatch-container">
          <div className="stopwatch-time">{display}</div>
          <div className="stopwatch-controls">
            {!running
              ? <button className="stopwatch-btn play" onPointerDown={handleStart}>&#9654;</button>
              : <button className="stopwatch-btn pause" onPointerDown={handlePause}>&#9208;</button>}
            <button className="stopwatch-btn reset" onPointerDown={handleReset}>&#8635;</button>
          </div>
        </div>
      );
    });

    /* ── Timezone helper: always interpret "now" as America/New_York ── */
    const etNow = () => new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));

    /* ══════════════════════════════════════════════════════════════
       MAIN APP
    ══════════════════════════════════════════════════════════════ */
    function WorkoutTracker() {
      /* ── State ── */
      const [page, setPage] = useState('history');
      const [workoutHistory, setWorkoutHistory] = useState([]);
      const [currentWorkout, setCurrentWorkout] = useState(null);
      const [showGroupSelect, setShowGroupSelect] = useState(false);
      const [exercises, setExercises] = useState([]);
      const [showPlateCalculator, setShowPlateCalculator] = useState(false);
      const [plateWeight, setPlateWeight] = useState('');
      const [numPlates45, setNumPlates45] = useState('');
      const [showAddExercise, setShowAddExercise] = useState(false);
      const [newExerciseName, setNewExerciseName] = useState('');
      const [customExercises, setCustomExercises] = useState({});
      const [activeExerciseCalc, setActiveExerciseCalc] = useState(null);
      const [exercisePlates45, setExercisePlates45] = useState('');
      const [deleteConfirmIndex, setDeleteConfirmIndex] = useState(null);
      const [deleteExerciseConfirm, setDeleteExerciseConfirm] = useState(null);
      const deleteConfirmTimer = React.useRef(null);
      const deleteExerciseTimer = React.useRef(null);
      const [viewingWorkout, setViewingWorkout] = useState(null);
      const [reviewDay, setReviewDay] = useState(null);
      const [showMonthDots, setShowMonthDots] = useState(false);
      const [expandedGroups, setExpandedGroups] = useState({});
      const [prExpanded, setPrExpanded] = useState(false);
      const [expandedPRs, setExpandedPRs] = useState({});
      const [showBackupModal, setShowBackupModal] = useState(false);
      const [importStatus, setImportStatus] = useState(null);

      // Cardio state
      const [cardioLog, setCardioLog] = useState([]);
      const [showCardioModal, setShowCardioModal] = useState(false);
      const [cardioMinutes, setCardioMinutes] = useState('');
      const [cardioType, setCardioType] = useState('Cardio');
      const [cardioDate, setCardioDate] = useState(() => { const d = etNow(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); });
      const [deleteCardioIndex, setDeleteCardioIndex] = useState(null);
      const deleteCardioTimer = React.useRef(null);
      const [expandedCardioTypes, setExpandedCardioTypes] = useState({});
      const [expandedCardioWeeks, setExpandedCardioWeeks] = useState({});
      const [editingCardioIndex, setEditingCardioIndex] = useState(null);
      const [editCardioType, setEditCardioType] = useState('Cardio');
      const [editCardioMinutes, setEditCardioMinutes] = useState('');
      const [editCardioDate, setEditCardioDate] = useState('');
      const [editCardioIncline, setEditCardioIncline] = useState('');
      const [editCardioSpeed, setEditCardioSpeed] = useState('');
      const [editCardioResistance, setEditCardioResistance] = useState('');
      const [cardioIncline, setCardioIncline] = useState('');
      const [cardioSpeed, setCardioSpeed] = useState('');
      const [cardioResistance, setCardioResistance] = useState('');

      // Steps state
      const [stepsLog, setStepsLog] = useState([]);
      const [showStepsModal, setShowStepsModal] = useState(false);
      const [stepCount, setStepCount] = useState('');
      const [stepDate, setStepDate] = useState(() => { const d = etNow(); d.setDate(d.getDate() - 1); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); });
      const [deleteStepsIndex, setDeleteStepsIndex] = useState(null);
      const deleteStepsTimer = React.useRef(null);
      const [expandedStepTypes, setExpandedStepTypes] = useState({});
      const [expandedStepsWeeks, setExpandedStepsWeeks] = useState({});
      const [expandedStepsTypeMonths, setExpandedStepsTypeMonths] = useState({});
      const [editingStepsIndex, setEditingStepsIndex] = useState(null);
      const [editStepCount, setEditStepCount] = useState('');
      const [editStepDate, setEditStepDate] = useState('');

      // Weight state
      const [weightLog, setWeightLog] = useState([]);
      const [showWeightModal, setShowWeightModal] = useState(false);
      const [weightValue, setWeightValue] = useState('');
      const [weightUnit, setWeightUnit] = useState('lbs');
      const [weightDate, setWeightDate] = useState(() => { const d = etNow(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); });
      const [deleteWeightIndex, setDeleteWeightIndex] = useState(null);
      const deleteWeightTimer = React.useRef(null);
      const [expandedWeightWeeks, setExpandedWeightWeeks] = useState({});
      const [editingWeightIndex, setEditingWeightIndex] = useState(null);
      const [editWeightValue, setEditWeightValue] = useState('');
      const [editWeightDate, setEditWeightDate] = useState('');
      const [editWeightUnit, setEditWeightUnit] = useState('lbs');

      /* ── Delete helpers ── */
      const armDeleteWorkout = (index) => {
        clearTimeout(deleteConfirmTimer.current);
        setDeleteConfirmIndex(index);
        if (index !== null) deleteConfirmTimer.current = setTimeout(() => setDeleteConfirmIndex(null), 2000);
      };
      const armDeleteExercise = (index) => {
        clearTimeout(deleteExerciseTimer.current);
        setDeleteExerciseConfirm(index);
        if (index !== null) deleteExerciseTimer.current = setTimeout(() => setDeleteExerciseConfirm(null), 2000);
      };
      const armDeleteCardio = (index) => {
        clearTimeout(deleteCardioTimer.current);
        setDeleteCardioIndex(index);
        if (index !== null) deleteCardioTimer.current = setTimeout(() => setDeleteCardioIndex(null), 2000);
      };
      const armDeleteSteps = (index) => {
        clearTimeout(deleteStepsTimer.current);
        setDeleteStepsIndex(index);
        if (index !== null) deleteStepsTimer.current = setTimeout(() => setDeleteStepsIndex(null), 2000);
      };
      const armDeleteWeight = (index) => {
        clearTimeout(deleteWeightTimer.current);
        setDeleteWeightIndex(index);
        if (index !== null) deleteWeightTimer.current = setTimeout(() => setDeleteWeightIndex(null), 2000);
      };

      /* ── Cardio CRUD ── */
      const deleteCardio = (index) => {
        const updated = [...cardioLog];
        updated.splice(index, 1);
        setCardioLog(updated);
        setDeleteCardioIndex(null);
        if (updated.length === 0) localStorage.removeItem('cardioLog');
      };
      const openEditCardio = (index) => {
        const entry = cardioLog[index];
        setEditingCardioIndex(index);
        setEditCardioType(entry.type || 'Cardio');
        setEditCardioMinutes(String(entry.minutes));
        setEditCardioDate(new Date(entry.date).toISOString().slice(0, 10));
        setEditCardioIncline(entry.incline != null ? String(entry.incline) : '');
        setEditCardioSpeed(entry.speed != null ? String(entry.speed) : '');
        setEditCardioResistance(entry.resistance != null ? String(entry.resistance) : '');
      };
      const saveCardioEdit = () => {
        const mins = parseFloat(editCardioMinutes);
        if (!mins || mins <= 0) return;
        const updated = [...cardioLog];
        const orig = new Date(updated[editingCardioIndex].date);
        const [y, m, d] = editCardioDate.split('-').map(Number);
        orig.setFullYear(y, m - 1, d);
        updated[editingCardioIndex] = {
          ...updated[editingCardioIndex],
          type: editCardioType,
          minutes: mins,
          date: orig.toISOString(),
          ...(editCardioType === 'Treadmill' ? { incline: editCardioIncline !== '' ? parseFloat(editCardioIncline) : null, speed: editCardioSpeed !== '' ? parseFloat(editCardioSpeed) : null } : { incline: null, speed: null }),
          ...(editCardioType === 'Elliptical' ? { resistance: editCardioResistance !== '' ? parseFloat(editCardioResistance) : null } : { resistance: null }),
        };
        updated.sort((a, b) => new Date(b.date) - new Date(a.date));
        setCardioLog(updated);
        setEditingCardioIndex(null);
      };
      const logCardio = () => {
        const mins = parseFloat(cardioMinutes);
        if (!mins || mins <= 0) return;
        const [y, m, d] = cardioDate.split('-').map(Number);
        const dateObj = new Date(y, m - 1, d, 12, 0, 0);
        setCardioLog(prev => [
          { date: dateObj.toISOString(), minutes: mins, type: cardioType || 'Cardio', ...(cardioType === 'Treadmill' ? { incline: cardioIncline !== '' ? parseFloat(cardioIncline) : null, speed: cardioSpeed !== '' ? parseFloat(cardioSpeed) : null } : {}), ...(cardioType === 'Elliptical' ? { resistance: cardioResistance !== '' ? parseFloat(cardioResistance) : null } : {}) },
          ...prev
        ]);
        setCardioMinutes('');
        setCardioType('Cardio');
        setCardioIncline('');
        setCardioSpeed('');
        setCardioResistance('');
        const _cd = etNow(); setCardioDate(_cd.getFullYear() + '-' + String(_cd.getMonth()+1).padStart(2,'0') + '-' + String(_cd.getDate()).padStart(2,'0'));
        setShowCardioModal(false);
      };

      /* ── Steps CRUD ── */
      const deleteSteps = (index) => {
        const updated = [...stepsLog];
        updated.splice(index, 1);
        setStepsLog(updated);
        setDeleteStepsIndex(null);
        if (updated.length === 0) localStorage.removeItem('stepsLog');
      };
      const logSteps = () => {
        const sc = parseInt(stepCount);
        if (!sc || sc <= 0) return;
        const [y, m, d] = stepDate.split('-').map(Number);
        const date = new Date();
        date.setFullYear(y, m - 1, d);
        const entry = { date: date.toISOString(), steps: sc };
        setStepsLog(prev => [...prev, entry].sort((a, b) => new Date(b.date) - new Date(a.date)));
        setStepCount('');
        const yesterday = etNow(); yesterday.setDate(yesterday.getDate() - 1); setStepDate(yesterday.getFullYear() + '-' + String(yesterday.getMonth()+1).padStart(2,'0') + '-' + String(yesterday.getDate()).padStart(2,'0'));
        setShowStepsModal(false);
      };
      const openEditSteps = (index) => {
        const entry = stepsLog[index];
        setEditingStepsIndex(index);
        setEditStepCount(String(entry.steps));
        setEditStepDate(new Date(entry.date).toISOString().slice(0, 10));
      };
      const saveStepsEdit = () => {
        const sc = parseInt(editStepCount);
        if (!sc || sc <= 0) return;
        const updated = [...stepsLog];
        const orig = new Date(updated[editingStepsIndex].date);
        const [y, m, d] = editStepDate.split('-').map(Number);
        orig.setFullYear(y, m - 1, d);
        updated[editingStepsIndex] = { steps: sc, date: orig.toISOString() };
        updated.sort((a, b) => new Date(b.date) - new Date(a.date));
        setStepsLog(updated);
        setEditingStepsIndex(null);
      };

      /* ── Weight CRUD ── */
      const deleteWeight = (index) => {
        const updated = [...weightLog];
        updated.splice(index, 1);
        setWeightLog(updated);
        setDeleteWeightIndex(null);
        if (updated.length === 0) localStorage.removeItem('weightLog');
      };
      const logWeight = () => {
        const w = parseFloat(weightValue);
        if (!w || w <= 0) return;
        const [y, m, d] = weightDate.split('-').map(Number);
        const dateObj = new Date(y, m - 1, d, 12, 0, 0);
        setWeightLog(prev => [...prev, { date: dateObj.toISOString(), weight: w, unit: weightUnit }].sort((a, b) => new Date(b.date) - new Date(a.date)));
        setWeightValue('');
        setShowWeightModal(false);
      };
      const openEditWeight = (index) => {
        const entry = weightLog[index];
        setEditingWeightIndex(index);
        setEditWeightValue(String(entry.weight));
        setEditWeightDate(new Date(entry.date).toISOString().slice(0, 10));
        setEditWeightUnit(entry.unit || 'lbs');
      };
      const saveWeightEdit = () => {
        const w = parseFloat(editWeightValue);
        if (!w || w <= 0) return;
        const updated = [...weightLog];
        const orig = new Date(updated[editingWeightIndex].date);
        const [y, m, d] = editWeightDate.split('-').map(Number);
        orig.setFullYear(y, m - 1, d);
        updated[editingWeightIndex] = { date: orig.toISOString(), weight: w, unit: editWeightUnit };
        updated.sort((a, b) => new Date(b.date) - new Date(a.date));
        setWeightLog(updated);
        setEditingWeightIndex(null);
      };

      /* ── Load / Save ── */
      useEffect(() => {
        const saved = localStorage.getItem('workoutHistory');
        if (saved) setWorkoutHistory(JSON.parse(saved));
        const savedCustom = localStorage.getItem('customExercises');
        if (savedCustom) setCustomExercises(JSON.parse(savedCustom));
        const savedCardio = localStorage.getItem('cardioLog');
        if (savedCardio) setCardioLog(JSON.parse(savedCardio));
        const savedSteps = localStorage.getItem('stepsLog');
        if (savedSteps) setStepsLog(JSON.parse(savedSteps));
        const savedWeight = localStorage.getItem('weightLog');
        if (savedWeight) setWeightLog(JSON.parse(savedWeight));
      }, []);

      useEffect(() => {
        if (workoutHistory.length > 0) localStorage.setItem('workoutHistory', JSON.stringify(workoutHistory));
      }, [workoutHistory]);
      useEffect(() => {
        if (Object.keys(customExercises).length > 0) localStorage.setItem('customExercises', JSON.stringify(customExercises));
      }, [customExercises]);
      useEffect(() => { localStorage.setItem('cardioLog', JSON.stringify(cardioLog)); }, [cardioLog]);
      useEffect(() => { localStorage.setItem('stepsLog', JSON.stringify(stepsLog)); }, [stepsLog]);
      useEffect(() => { localStorage.setItem('weightLog', JSON.stringify(weightLog)); }, [weightLog]);

      /* ── Backup ── */
      const exportData = () => {
        const data = { exportedAt: new Date().toISOString(), version: 2, workoutHistory, customExercises, cardioLog, stepsLog, weightLog };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const etExport = etNow();
        a.download = 'iron-log-backup-' + etExport.getFullYear() + '-' + String(etExport.getMonth()+1).padStart(2,'0') + '-' + String(etExport.getDate()).padStart(2,'0') + '.json';
        a.click();
        URL.revokeObjectURL(url);
      };
      const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!data.workoutHistory || !Array.isArray(data.workoutHistory)) throw new Error('Invalid');
            setWorkoutHistory(data.workoutHistory);
            localStorage.setItem('workoutHistory', JSON.stringify(data.workoutHistory));
            if (data.customExercises) { setCustomExercises(data.customExercises); localStorage.setItem('customExercises', JSON.stringify(data.customExercises)); }
            if (data.cardioLog) { setCardioLog(data.cardioLog); localStorage.setItem('cardioLog', JSON.stringify(data.cardioLog)); }
            if (data.stepsLog) { setStepsLog(data.stepsLog); localStorage.setItem('stepsLog', JSON.stringify(data.stepsLog)); }
            if (data.weightLog) { setWeightLog(data.weightLog); localStorage.setItem('weightLog', JSON.stringify(data.weightLog)); }
            setImportStatus('success');
            setTimeout(() => { setImportStatus(null); setShowBackupModal(false); }, 2000);
          } catch {
            setImportStatus('error');
            setTimeout(() => setImportStatus(null), 3000);
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      /* ── Workout actions ── */
      const startWorkout = (muscleGroup) => {
        const defaultExercises = MUSCLE_GROUPS[muscleGroup] || [];
        const customExercisesForGroup = customExercises[muscleGroup] || [];
        const groupExercises = [...defaultExercises, ...customExercisesForGroup];
        const lastWorkout = workoutHistory
          .filter(w => w.muscleGroup === muscleGroup)
          .sort((a, b) => new Date(b.date) - new Date(a.date))[0];
        const initialExercises = groupExercises.map(name => {
          const lastExercise = lastWorkout?.exercises.find(e => e.name === name);
          const copiedSets = lastExercise?.sets
            ? lastExercise.sets.map(set => ({ weight: set.weight, reps: set.reps, linked: (set.linked || []).map(l => ({ ...l })) }))
            : [{ weight: 0, reps: 0, linked: [] }];
          return { name, sets: copiedSets, completed: false, notes: lastExercise?.notes || '' };
        });
        setCurrentWorkout({ muscleGroup, date: new Date().toISOString(), exercises: initialExercises });
        setExercises(initialExercises);
        setPage('workout');
        setShowGroupSelect(false);
      };

      const deleteWorkout = (index) => {
        const updated = [...workoutHistory];
        updated.splice(index, 1);
        setWorkoutHistory(updated);
        setDeleteConfirmIndex(null);
        if (updated.length === 0) localStorage.removeItem('workoutHistory');
      };
      const handleDeleteClick = (index) => {
        if (deleteConfirmIndex === index) deleteWorkout(index);
        else armDeleteWorkout(index);
      };
      const viewWorkout = (workout) => { setViewingWorkout(workout); setPage('detail'); };
      const continueWorkout = (workout) => {
        const exs = workout.exercises.map(ex => ({ ...ex, sets: ex.sets.map(s => ({ ...s })), completed: false }));
        setCurrentWorkout({ muscleGroup: workout.muscleGroup, date: new Date().toISOString(), exercises: exs });
        setExercises(exs);
        setPage('workout');
      };

      /* ── Exercise editing ── */
      const addSet = (ei) => {
        const u = [...exercises];
        const last = u[ei].sets[u[ei].sets.length - 1];
        u[ei].sets.push({ weight: last.weight, reps: last.reps, linked: [] });
        setExercises(u);
      };
      const updateSet = (ei, si, field, value) => {
        const u = [...exercises];
        u[ei].sets[si][field] = parseFloat(value) || 0;
        setExercises(u);
      };
      const updateNote = (ei, value) => {
        const u = [...exercises];
        u[ei].notes = value;
        setExercises(u);
      };
      const addLinkedSet = (ei, si, type) => {
        const u = [...exercises];
        const set = u[ei].sets[si];
        if (!set.linked) set.linked = [];
        set.linked.push({ type, weight: type === 'drop' ? Math.max(0, set.weight - 10) : 0, reps: set.reps || 0 });
        setExercises(u);
      };
      const updateLinkedSet = (ei, si, li, field, value) => {
        const u = [...exercises];
        u[ei].sets[si].linked[li][field] = parseFloat(value) || 0;
        setExercises(u);
      };
      const removeLinkedSet = (ei, si, li) => {
        const u = [...exercises];
        u[ei].sets[si].linked.splice(li, 1);
        setExercises(u);
      };
      const removeSet = (ei, si) => {
        const u = [...exercises];
        if (u[ei].sets.length > 1) { u[ei].sets.splice(si, 1); setExercises(u); }
      };
      const deleteExercise = (index) => {
        const u = [...exercises];
        u.splice(index, 1);
        setExercises(u);
        setDeleteExerciseConfirm(null);
      };
      const moveExercise = (index, dir) => {
        const ni = index + dir;
        if (ni < 0 || ni >= exercises.length) return;
        const u = [...exercises];
        [u[index], u[ni]] = [u[ni], u[index]];
        setExercises(u);
      };
      const toggleExerciseComplete = (ei) => {
        const u = [...exercises];
        u[ei].completed = !u[ei].completed;
        setExercises(u);
      };
      const finishWorkout = () => {
        const workout = { ...currentWorkout, exercises, date: new Date().toISOString() };
        setWorkoutHistory([workout, ...workoutHistory]);
        setPage('history');
        setCurrentWorkout(null);
        setExercises([]);
      };
      const addCustomExercise = () => {
        if (!newExerciseName.trim() || !currentWorkout) return;
        const mg = currentWorkout.muscleGroup;
        const u = { ...customExercises };
        if (!u[mg]) u[mg] = [];
        if (!u[mg].includes(newExerciseName.trim())) {
          u[mg].push(newExerciseName.trim());
          setCustomExercises(u);
          setExercises([{ name: newExerciseName.trim(), sets: [{ weight: 0, reps: 0, linked: [] }], completed: false, notes: '' }, ...exercises]);
        }
        setNewExerciseName('');
        setShowAddExercise(false);
      };

      /* ── Plate calculator ── */
      const calculatePlates = (weight) => {
        const wps = weight / 2;
        if (wps <= 0) return 'Enter weight';
        const plates = [45, 35, 25, 10, 5, 2.5];
        const result = [];
        let rem = wps;
        for (const p of plates) {
          const c = Math.floor(rem / p);
          if (c > 0) { result.push(c + 'x' + p + 'lb'); rem -= c * p; }
        }
        if (rem > 0.1) result.push('+' + rem.toFixed(1) + 'lb');
        return result.length > 0 ? result.join(' + ') : 'No plates needed';
      };
      const calculateWeightFrom45s = (n) => (!n || n <= 0) ? 0 : n * 45 * 2;
      const applyPlatesWeightToExercise = (ei) => {
        if (!exercisePlates45) return;
        const cw = calculateWeightFrom45s(parseFloat(exercisePlates45));
        const u = [...exercises];
        const last = u[ei].sets[u[ei].sets.length - 1];
        u[ei].sets.push({ weight: cw, reps: last.reps || 0 });
        setExercises(u);
        setActiveExerciseCalc(null);
        setExercisePlates45('');
      };

      /* ── Formatting helpers ── */
      const formatDate = (dateString) => {
        const date = new Date(dateString);
        const today = etNow();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        if (date.toDateString() === today.toDateString()) return 'Today';
        if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
        const dayOfWeek = date.toLocaleDateString('en-US', { weekday: 'long' });
        const month = date.toLocaleDateString('en-US', { month: 'short' });
        const day = date.getDate();
        return dayOfWeek + ', ' + month + ' ' + day;
      };
      const formatCardioDate = (dateString) => {
        const date = new Date(dateString);
        const today = etNow();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        const dayOfWeek = date.toLocaleDateString('en-US', { weekday: 'long' });
        const month = date.toLocaleDateString('en-US', { month: 'short' });
        const day = date.getDate();
        const full = dayOfWeek + ', ' + month + ' ' + day;
        if (date.toDateString() === today.toDateString()) return 'Today \u00b7 ' + full;
        if (date.toDateString() === yesterday.toDateString()) return 'Yesterday \u00b7 ' + full;
        return full;
      };

      /* ── Stat helpers ── */
      const getTotalVolume = (w) =>
        w.exercises.reduce((t, ex) => t + ex.sets.reduce((s, set) => s + (set.weight * set.reps), 0), 0);
      const getFilledSetsCount = (w) =>
        w.exercises.reduce((t, ex) => t + ex.sets.filter(s => s.weight > 0 || s.reps > 0).length, 0);
      const getFilledExercisesCount = (w) =>
        w.exercises.filter(ex => ex.sets.some(s => s.weight > 0 || s.reps > 0)).length;
      const getExercisePR = (name, mg) => {
        let maxWeight = 0, maxVolume = 0;
        workoutHistory.filter(w => w.muscleGroup === mg).forEach(w => {
          const ex = w.exercises.find(e => e.name === name);
          if (ex) ex.sets.forEach(s => {
            if (s.weight > maxWeight) maxWeight = s.weight;
            const v = s.weight * s.reps;
            if (v > maxVolume) maxVolume = v;
          });
        });
        return { maxWeight, maxVolume };
      };
      const compareWithPrevious = (cw) => {
        if (!cw) return null;
        const prev = workoutHistory.filter(w => w.muscleGroup === cw.muscleGroup).sort((a, b) => new Date(b.date) - new Date(a.date));
        if (prev.length === 0) return null;
        const p = prev[0];
        const cv = getTotalVolume(cw);
        const pv = getTotalVolume(p);
        return { volumeDiff: cv - pv, volumePercent: pv > 0 ? ((cv - pv) / pv * 100) : 0, previous: p };
      };
      const groupWorkoutsByMuscle = () => {
        const g = {};
        workoutHistory.forEach(w => { if (!g[w.muscleGroup]) g[w.muscleGroup] = []; g[w.muscleGroup].push(w); });
        return g;
      };
      const toggleGroup = (mg) => setExpandedGroups(prev => ({ ...prev, [mg]: !prev[mg] }));

      /* ── CompareBar component ── */
      const CompareBar = ({ cur, prev, fmt, unit, label, onTap, color }) => {
        const max = Math.max(cur, prev, 1);
        const curPct = Math.max((cur / max) * 100, cur > 0 ? 6 : 0);
        const prevPct = Math.max((prev / max) * 100, prev > 0 ? 6 : 0);
        const diff = cur - prev;
        const fmtVol = v => v >= 1000 ? (v / 1000).toFixed(1) + 'k' : String(v);
        const diffFmt = (diff > 0 ? '+' : '') + (unit === 'min' || unit === 'steps' ? diff.toLocaleString() + ' ' + unit : fmtVol(Math.abs(diff)) + (diff < 0 ? ' less' : ''));
        const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
        return (
          <div className="cmp-block" onClick={onTap} style={onTap ? { cursor: 'pointer' } : {}}>
            <div className="cmp-header">
              <span className="cmp-label">{label}</span>
              <span className={"cmp-delta " + cls}>{diff === 0 ? '\u2014 same' : diffFmt}</span>
            </div>
            <div className="cmp-bars">
              <div className="cmp-bar-row">
                <span className="cmp-bar-week-label">Now</span>
                <div className="cmp-bar-track">
                  <div className="cmp-bar-fill cur" style={{ width: curPct + '%', ...(color ? { background: color } : {}) }}>
                    <span className="cmp-bar-val">{fmt(cur)}{unit ? ' ' + unit : ''}</span>
                  </div>
                </div>
              </div>
              <div className="cmp-bar-row">
                <span className="cmp-bar-week-label">&ndash;1w</span>
                <div className="cmp-bar-track">
                  <div className="cmp-bar-fill prev" style={{ width: prevPct + '%' }}>
                    <span className="cmp-bar-val prev-val">{fmt(prev)}{unit ? ' ' + unit : ''}</span>
                  </div>
                </div>
              </div>
            </div>
            {onTap && <div className="cmp-log-hint">tap to log</div>}
          </div>
        );
      };

      /* ── Sub-page header ── */
      const renderSubHeader = (title, color, onBack) => (
        <div className="workout-header" style={{ background: 'linear-gradient(135deg, ' + color + ' 0%, ' + color + '99 100%)' }}>
          <button className="back-btn" onClick={onBack}><ChevronLeft size={24} /></button>
          <h2>{title}</h2>
        </div>
      );

         RENDER

                    </div>
                    <div style={{ fontSize: '11px', fontWeight: 700, color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '8px' }}>Weight</div>
                    <input type="number" step="0.1" className="calculator-input" value={editWeightValue} onChange={e => setEditWeightValue(e.target.value)} placeholder={'Weight (' + editWeightUnit + ')'} style={{ marginBottom: '14px' }} />
                    <button className="save-weight-btn" onClick={saveWeightEdit} disabled={!editWeightValue || parseFloat(editWeightValue) <= 0}>Save Changes</button>
                    <button className="modal-btn" onClick={() => setEditingWeightIndex(null)} style={{ marginTop: '10px' }}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ══════════════════════════════════════════════════════════════
             WORKOUT DETAIL VIEW
          ══════════════════════════════════════════════════════════════ */}
          {page === 'detail' && viewingWorkout && (
            <div className="detail-page">
              <div className="exercises-list">
                <div style={{ marginBottom: '20px' }}>
                  <div className="workout-date" style={{ fontSize: '14px', opacity: '0.7' }}><Calendar size={16} />{formatDate(viewingWorkout.date)}</div>
                  <div className="workout-stats" style={{ marginTop: '15px' }}>
                    <div className="stat"><div className="stat-label">Exercises</div><div className="stat-value">{getFilledExercisesCount(viewingWorkout)}</div></div>
                    <div className="stat"><div className="stat-label">Total Sets</div><div className="stat-value">{getFilledSetsCount(viewingWorkout)}</div></div>
                    <div className="stat">
                      <div className="stat-label">Volume</div>
                      <div className="stat-value">
                        {getTotalVolume(viewingWorkout).toLocaleString()}
                        {(() => {
                          const c = compareWithPrevious(viewingWorkout);
                          if (c && c.volumeDiff !== 0) {
                            const up = c.volumeDiff > 0;
                            return <span className={"progress-indicator " + (up ? 'up' : 'down')}>{up ? '\u2191' : '\u2193'} {Math.abs(c.volumePercent).toFixed(1)}%</span>;
                          }
                          return null;
                        })()}
                      </div>
                    </div>
                  </div>
                </div>
                {(() => {
                  const c = compareWithPrevious(viewingWorkout);
                  if (c?.previous) {
                    return (
                      <div className="previous-workout-section">
                        <div className="previous-workout-title">vs. {formatDate(c.previous.date)}</div>
                        <div style={{ fontSize: '13px', opacity: '0.8' }}>Previous Volume: {getTotalVolume(c.previous).toLocaleString()} lbs</div>
                      </div>
                    );
                  }
                  return null;
                })()}
                {viewingWorkout.exercises
                  .filter(exercise => exercise.sets.some(set => set.weight > 0 || set.reps > 0))
                  .map((exercise, exIndex) => {
                    const pr = getExercisePR(exercise.name, viewingWorkout.muscleGroup);
                    const maxSetWeight = Math.max(...exercise.sets.map(s => s.weight));
                    const isPR = maxSetWeight > 0 && maxSetWeight >= pr.maxWeight && pr.maxWeight > 0;
                    const previousWorkouts = workoutHistory
                      .filter(w => w.muscleGroup === viewingWorkout.muscleGroup && w.date !== viewingWorkout.date)
                      .sort((a, b) => new Date(b.date) - new Date(a.date));
                    const previousExercise = previousWorkouts[0]?.exercises.find(e => e.name === exercise.name);
                    return (
                      <div key={exIndex} className={"exercise-card " + (exercise.completed ? 'completed' : '')}>
                        <div className="exercise-header">
                          <div className="exercise-name">{exercise.name}{isPR && <span className="pr-badge">PR</span>}</div>
                        </div>
                        <div className="sets-list">
                          {exercise.sets.map((set, setIndex) => {
                            const prevSet = previousExercise?.sets[setIndex];
                            const weightImproved = prevSet && set.weight > prevSet.weight;
                            const repsImproved = prevSet && set.weight === prevSet.weight && set.reps > prevSet.reps;
                            return (
                              <div key={setIndex}>
                                <div className="set-row readonly">
                                  <div className="set-number">{setIndex + 1}</div>
                                  <div className="set-input-group">
                                    <div className="set-input-label">Weight (lbs)</div>
                                    <div className="set-value">{set.weight || 0}{weightImproved && <span style={{ color: '#4ade80', marginLeft: '4px' }}>&uarr;</span>}</div>
                                  </div>
                                  <div className="set-input-group">
                                    <div className="set-input-label">Reps</div>
                                    <div className="set-value">{set.reps || 0}{repsImproved && <span style={{ color: '#4ade80', marginLeft: '4px' }}>&uarr;</span>}</div>
                                  </div>
                                </div>
                                {prevSet && (
                                  <div className={"set-comparison " + ((weightImproved || repsImproved) ? 'improved' : '')}>
                                    Previous: {prevSet.weight}lbs x {prevSet.reps} reps
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                        {exercise.notes ? <div className="exercise-notes-view">{exercise.notes}</div> : null}
                      </div>
                    );
                  })}
              </div>
            </div>
          )}

          {/* ══════════════════════════════════════════════════════════════
             ACTIVE WORKOUT PAGE
          ══════════════════════════════════════════════════════════════ */}
          {page === 'workout' && (
            <div className="workout-page">
              <div className="add-exercise-section" style={{ paddingBottom: 0 }}>
                <button className="add-exercise-btn" onClick={() => setShowAddExercise(true)}>
                  <Plus size={20} /> Add Custom Exercise
                </button>
              </div>

              <div className="exercises-list">
                {exercises.map((exercise, exIndex) => {
                  const pr = getExercisePR(exercise.name, currentWorkout.muscleGroup);
                  const maxSetWeight = Math.max(...exercise.sets.map(s => s.weight), 0);
                  const isPR = maxSetWeight > 0 && maxSetWeight >= pr.maxWeight && pr.maxWeight > 0;
                  const previousWorkouts = workoutHistory
                    .filter(w => w.muscleGroup === currentWorkout.muscleGroup)
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
                  const previousExercise = previousWorkouts[0]?.exercises.find(e => e.name === exercise.name);

                  return (
                    <div key={exIndex} className={"exercise-card " + (exercise.completed ? 'completed' : '')}>
                      <div className="exercise-header">
                        <div className="exercise-name">
                          {exercise.name}
                          {isPR && <span className="pr-badge">NEW PR!</span>}
                        </div>
                        <div className="exercise-controls">
                          <button className="reorder-btn" onClick={() => moveExercise(exIndex, -1)} disabled={exIndex === 0}><ChevronUp size={14} /></button>
                          <button className="reorder-btn" onClick={() => moveExercise(exIndex, 1)} disabled={exIndex === exercises.length - 1}><ChevronDown size={14} /></button>
                          <button className={"exercise-delete-btn " + (deleteExerciseConfirm === exIndex ? 'confirm' : '')} onClick={() => { if (deleteExerciseConfirm === exIndex) deleteExercise(exIndex); else armDeleteExercise(exIndex); }}>
                            {deleteExerciseConfirm === exIndex ? 'Delete?' : <Trash2 size={13} />}
                          </button>
                          <button className="exercise-plate-btn" onClick={() => setActiveExerciseCalc(exIndex)}>Plates</button>
                          <div className={"complete-checkbox " + (exercise.completed ? 'checked' : '')} onClick={() => toggleExerciseComplete(exIndex)}>
                            {exercise.completed && <Check size={18} />}
                          </div>
                        </div>
                      </div>

                      {previousExercise && (
                        <div style={{ fontSize: '11px', opacity: '0.6', marginBottom: '10px' }}>
                          Last workout: {previousExercise.sets.map(s => s.weight + 'x' + s.reps).join(', ')}
                        </div>
                      )}

                      <div className="sets-list">
                        {exercise.sets.map((set, setIndex) => {
                          const prevSet = previousExercise?.sets[setIndex];
                          const weightImproved = prevSet && set.weight > prevSet.weight;
                          const repsImproved = prevSet && set.weight === prevSet.weight && set.reps > prevSet.reps;
                          const showImprovement = (weightImproved || repsImproved) && set.weight > 0 && set.reps > 0;
                          return (
                            <div key={setIndex}>
                              <div className="set-row">
                                <div className="set-number">
                                  {setIndex + 1}
                                  {showImprovement && <div style={{ color: '#4ade80', fontSize: '16px' }}>&uarr;</div>}
                                </div>
                                <div className="set-input-group">
                                  <div className="set-input-label">Weight (lbs)</div>
                                  <input type="number" className="set-input" value={set.weight || ''} onChange={e => updateSet(exIndex, setIndex, 'weight', e.target.value)} placeholder="0" style={weightImproved && set.weight > 0 ? { borderColor: '#4ade80', background: 'rgba(74,222,128,0.1)' } : {}} />
                                  {set.weight > 45 && <div style={{ fontSize: '10px', color: 'rgba(255,165,0,0.7)', marginTop: '4px', textAlign: 'center', lineHeight: 1.3 }}>{calculatePlates(set.weight)}</div>}
                                </div>
                                <div className="set-input-group">
                                  <div className="set-input-label">Reps</div>
                                  <input type="number" className="set-input" value={set.reps || ''} onChange={e => updateSet(exIndex, setIndex, 'reps', e.target.value)} placeholder="0" style={repsImproved && set.reps > 0 ? { borderColor: '#4ade80', background: 'rgba(74,222,128,0.1)' } : {}} />
                                </div>
                                {exercise.sets.length > 1 && (
                                  <button className="remove-set-btn" onClick={() => removeSet(exIndex, setIndex)}>x</button>
                                )}
                              </div>
                              <div style={{ display: 'flex', gap: '6px', marginLeft: '20px', marginBottom: '2px' }}>
                                <button className="add-linked-btn" onClick={() => addLinkedSet(exIndex, setIndex, 'drop')}>
                                  <span className="add-linked-pill drop">+ DS</span>
                                </button>
                                <button className="add-linked-btn" onClick={() => addLinkedSet(exIndex, setIndex, 'super')}>
                                  <span className="add-linked-pill super">+ SS</span>
                                </button>
                              </div>
                              {(set.linked || []).map((lset, li) => (
                                <div key={li} className={"linked-set-row " + lset.type}>
                                  <span className={"linked-type-badge " + lset.type}>{lset.type === 'drop' ? 'DS' : 'SS'}</span>
                                  <div className="set-input-group">
                                    <div className="set-input-label">lbs</div>
                                    <input type="number" className="linked-input" value={lset.weight || ''} onChange={e => updateLinkedSet(exIndex, setIndex, li, 'weight', e.target.value)} placeholder="0" />
                                  </div>
                                  <div className="set-input-group">
                                    <div className="set-input-label">reps</div>
                                    <input type="number" className="linked-input" value={lset.reps || ''} onChange={e => updateLinkedSet(exIndex, setIndex, li, 'reps', e.target.value)} placeholder="0" />
                                  </div>
                                  <button className="linked-remove-btn" onClick={() => removeLinkedSet(exIndex, setIndex, li)}>x</button>
                                </div>
                              ))}
                            </div>
                          );
                        })}
                      </div>

                      <button className="add-set-btn" onClick={() => addSet(exIndex)}>
                        <Plus size={16} /> Add Set
                      </button>

                      <textarea className="exercise-notes" value={exercise.notes || ''} onChange={e => updateNote(exIndex, e.target.value)} placeholder="Notes..." rows={1} />
                    </div>
                  );
                })}
              </div>

              <button className="finish-workout-btn" onClick={finishWorkout}>
                <Check size={24} /> Finish Workout
              </button>

              {/* Plate calculator per exercise */}
              {activeExerciseCalc !== null && (
                <div className="calculator-modal" onClick={() => { setActiveExerciseCalc(null); setExercisePlates45(''); }}>
                  <div className="calculator-content" onClick={e => e.stopPropagation()}>
                    <div className="calculator-title">{exercises[activeExerciseCalc]?.name}</div>
                    <div className="result-label" style={{ marginBottom: '10px' }}>45lb Plates per side - Add set</div>
                    <input type="number" className="calculator-input" value={exercisePlates45} onChange={e => setExercisePlates45(e.target.value)} placeholder="# of 45lb plates per side" />
                    {exercisePlates45 && (
                      <div className="calculator-result">
                        <div className="result-label">Total weight</div>
                        <div className="result-value">{calculateWeightFrom45s(parseFloat(exercisePlates45))} lbs</div>
                      </div>
                    )}
                    <div className="modal-btn-group" style={{ marginTop: '20px' }}>
                      <button className="modal-btn-primary" onClick={() => applyPlatesWeightToExercise(activeExerciseCalc)} disabled={!exercisePlates45}>Add Set with Weight</button>
                      <button className="modal-btn-secondary" onClick={() => { setActiveExerciseCalc(null); setExercisePlates45(''); }}>Cancel</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Global plate calculator */}
              {showPlateCalculator && (
                <div className="calculator-modal" onClick={() => { setShowPlateCalculator(false); setPlateWeight(''); setNumPlates45(''); }}>
                  <div className="calculator-content" onClick={e => e.stopPropagation()}>
                    <div className="calculator-title">Plate Calculator</div>
                    <div style={{ marginBottom: '30px' }}>
                      <div className="result-label" style={{ marginBottom: '10px' }}>Weight - Plates per side</div>
                      <input type="number" className="calculator-input" value={plateWeight} onChange={e => setPlateWeight(e.target.value)} placeholder="Enter total weight (lbs)" />
                      {plateWeight && (
                        <div className="calculator-result">
                          <div className="result-label">Plates per side</div>
                          <div className="result-value">{calculatePlates(parseFloat(plateWeight))}</div>
                        </div>
                      )}
                    </div>
                    <div>
                      <div className="result-label" style={{ marginBottom: '10px' }}>45lb Plates - Total weight</div>
                      <input type="number" className="calculator-input" value={numPlates45} onChange={e => setNumPlates45(e.target.value)} placeholder="# of 45lb plates per side" />
                      {numPlates45 && (
                        <div className="calculator-result">
                          <div className="result-label">Total weight</div>
                          <div className="result-value">{calculateWeightFrom45s(parseFloat(numPlates45))} lbs</div>
                        </div>
                      )}
                    </div>
                    <button className="modal-btn" onClick={() => { setShowPlateCalculator(false); setPlateWeight(''); setNumPlates45(''); }}>Close</button>
                  </div>
                </div>
              )}

              {/* Add exercise modal */}
              {showAddExercise && (
                <div className="add-exercise-modal" onClick={() => setShowAddExercise(false)}>
                  <div className="add-exercise-content" onClick={e => e.stopPropagation()}>
                    <div className="add-exercise-title">Add Custom Exercise</div>
                    <input type="text" className="exercise-input" value={newExerciseName} onChange={e => setNewExerciseName(e.target.value)} placeholder="Exercise name" onKeyPress={e => e.key === 'Enter' && addCustomExercise()} />
                    <div className="modal-btn-group">
                      <button className="modal-btn-primary" onClick={addCustomExercise}>Add Exercise</button>
                      <button className="modal-btn-secondary" onClick={() => { setShowAddExercise(false); setNewExerciseName(''); }}>Cancel</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<WorkoutTracker />);
  </script>
</body>
</html>
